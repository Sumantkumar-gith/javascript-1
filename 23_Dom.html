<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom 3</title>
    <style>
        body{
            background-color: #212121;
            color: white;
        }
    </style>
</head>
<body>
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    function addLang(langName) {
        const li = document.createElement("li")
        li.innerHTML = `${langName}`
        document.querySelector('.language').appendChild(li)
    }
    const lang1 = addLang('C++')
    
    function addOptiLang(langName){
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(langName))
        document.querySelector('.language').appendChild(li)
    }
    addOptiLang('typescript')

    //edit
    const secondLang = document.querySelector('li:nth-child(2)')
    // secondLang.innerHTML = "mojo"
    const newLi = document.createElement('li')
    newLi.textContent = "mojo"
    secondLang.replaceWith(newLi) //it replaces old with new

    //edit

    const thirdLang = document.querySelector('li:nth-child(3)')
    thirdLang.outerHTML = '<li>Type</li>'

    //remove
    const lastLang = document.querySelector('li:last-child')
    lastLang.remove()
</script>
</html>
