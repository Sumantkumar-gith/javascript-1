<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom learning</title>
    <style>
        body{
            background-color: #212121;
        }
        .parent{
            color: white;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="day">Monday</div>
        <!-- this is a comment --> //it is also counted as two nodes
        <div class="day">Tuesday</div>
        <div class="day">Wednesday</div>
        <div class="day">Thursday</div>      //other option- getElementbyId/getElementbyClassName,etc
    </div>
    <script>
        const parent = document.querySelector('.parent')
        console.log(parent);           //queryselectorAll is nodelist which has forEach property
        console.log(parent.children); //array like property html collection and can covert to array
        console.log(parent.children[1].innerHTML);
        for (let i = 0; i < parent.children.length; i++) {
            console.log(parent.children[i].innerText);          //anything works like parent.children[i].innerText/textContent/innerHTML
        }
        parent.children[1].style.color = "yellow"  //we can change style or add style in this way to particular element
        console.log(parent.firstElementChild);    //first child
        console.log(parent.lastElementChild);      //last element
        const day1 = document.querySelector(".day")  //selects first one whose class is day
        console.log(day1);
        console.log(day1.parentElement);     //parent
        console.log(day1.nextElementSibling);  //next sibling
        console.log("nodes: ", parent.childNodes);  //all lines break(only the first one) are text nodes and attributes are also nodes so total 9 nodes                            
    </script>
</body>
</html>
